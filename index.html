<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeAnalyzer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="4" width="16" height="16" rx="2" fill="#007BFF" />
                    <path d="M8 10h8M8 14h5" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span class="brand-name">ResumeAnalyzer</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link">Product</a>
                <a href="#" class="nav-link">Resources</a>
            </div>
        </div>
    </nav>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="24" fill="#E3F2FD" />
                        <path
                            d="M24 20c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"
                            fill="#007BFF" />
                    </svg>
                </div>

                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to optimize your CV and get hired</p>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <div class="form-label-row">
                            <label for="password" class="form-label">Password</label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>
                        <div class="password-input-container">
                            <input type="password" id="password" class="form-input" placeholder="Enter your password"
                                required>
                            <button type="button" class="password-toggle">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                                    <path
                                        d="M10 4C5 4 1 10 1 10s4 6 9 6 9-6 9-6-4-6-9-6zm0 10c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="remember" class="checkbox-input">
                        <label for="remember" class="checkbox-label">Keep me logged in</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large btn-full">Sign In</button>

                    <div class="auth-divider">
                        <span>OR</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="btn-social" id="googleLoginBtn">
                            <svg width="20" height="20" viewBox="0 0 20 20">
                                <path fill="#4285F4"
                                    d="M19.6 10.2c0-.7-.1-1.4-.2-2H10v3.8h5.4c-.2 1.2-1 2.2-2.1 2.9v2.5h3.4c2-1.8 3.1-4.5 3.1-7.2z" />
                                <path fill="#34A853"
                                    d="M10 20c2.8 0 5.1-.9 6.8-2.5l-3.4-2.5c-.9.6-2.1 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H1v2.6C2.7 17.9 6.1 20 10 20z" />
                                <path fill="#FBBC05"
                                    d="M4.4 11.9c-.4-1.2-.4-2.5 0-3.7V5.6H1C-.4 7.8-.4 12.2 1 14.4l3.4-2.5z" />
                                <path fill="#EA4335"
                                    d="M10 4c1.4 0 2.7.5 3.7 1.4l2.8-2.8C14.1.9 12.1 0 10 0 6.1 0 2.7 2.1 1 5.6l3.4 2.5C5.2 5.8 7.4 4 10 4z" />
                            </svg>
                            Google
                        </button>
                        <button type="button" class="btn-social" id="linkedinLoginBtn">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="#0077B5">
                                <path
                                    d="M18.5 0h-17C.7 0 0 .7 0 1.5v17c0 .8.7 1.5 1.5 1.5h17c.8 0 1.5-.7 1.5-1.5v-17C20 .7 19.3 0 18.5 0zM6 17H3V8h3v9zM4.5 6.7c-1 0-1.7-.8-1.7-1.7S3.5 3.3 4.5 3.3 6.2 4 6.2 5s-.8 1.7-1.7 1.7zM17 17h-3v-4.4c0-1.1 0-2.5-1.5-2.5s-1.7 1.2-1.7 2.4V17H8V8h2.8v1.2h0c.4-.8 1.4-1.5 2.8-1.5 3 0 3.6 2 3.6 4.5V17z" />
                            </svg>
                            LinkedIn
                        </button>
                    </div>

                    <p class="auth-footer-text">
                        Don't have an account? <a href="signup.html" class="auth-link">New user sign up</a>
                    </p>
                </form>
            </div>

            <p class="auth-copyright">© 2024 ResumeAnalyzer. All rights reserved.<br>
                <a href="#" class="copyright-link">Privacy Policy</a> •
                <a href="#" class="copyright-link">Terms of Service</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
